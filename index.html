<!DOCTYPE html>
<html>
<head>
  <title>Basket Builder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f6f6f6;
    }

    h1 {
      text-align: center;
      font-size: 22px;
    }

    h3 {
      font-size: 16px;
      margin-top: 16px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #111;
      color: white;
    }

    button:disabled {
      background: #ccc !important;
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ================= SEARCH OVERLAY ================= */
    #searchWrapper {
      position: relative;
    }

    #searchResults {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;

      max-height: 260px;
      overflow-y: auto;

      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;

      padding: 6px;

      display: none;
      z-index: 999;
    }

    .resultRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .resultRow:last-child {
      border-bottom: none;
    }

    .addBtn {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      background: #111;
      color: white;
      border-radius: 6px;
    }

    #closeBtn {
      display: none;
      position: absolute;
      right: 8px;
      top: 8px;

      width: auto;
      padding: 4px 8px;
      font-size: 12px;

      background: #444;
      color: white;
      z-index: 1000;
    }

    /* ================= BASKET ================= */
    #basketSection {
      display: none; /* IMPORTANT: hidden by default */
    }

    li {
      list-style: none;
      background: white;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #summary {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Basket Builder</h1>

  <!-- ================= BASKETS ================= -->
  <h3>Baskets</h3>

  <input id="newBasketName" placeholder="New basket name" />
  <button id="createBtn" onclick="createBasket()" disabled>
    Create Basket
  </button>

  <select id="basketSelector" onchange="switchBasket()"></select>

  <button onclick="deleteBasket()">Delete Basket</button>
  <button onclick="saveAll()">Save</button>

  <hr>

  <!-- ================= SEARCH ================= -->
  <h3>Search Coin</h3>

  <div id="searchWrapper">

    <input id="searchCoin" placeholder="Search token..." />

    <button id="closeBtn" onclick="closeSearch()">Close</button>

    <div id="searchResults"></div>

  </div>

  <hr>

  <!-- ================= BASKET (HIDDEN UNTIL ACTIVE) ================= -->
  <h3>Basket</h3>

  <div id="basketSection">
    <ul id="coinList"></ul>
    <p id="summary"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
